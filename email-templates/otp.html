<div style="font-family: Arial, Helvetica, sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 20px;">
  <p style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #047857; margin-bottom: 4px;">
    Titan Optical
  </p>
  <h1 style="font-size: 28px; font-weight: 900; margin: 0 0 8px; color: #0f172a;">
    Verify your email
  </h1>
  <p style="color: #64748b; font-size: 15px; line-height: 1.5; margin: 0 0 24px;">
    Enter the code below to complete your account setup.
  </p>
  <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; text-align: center;">
    <p style="font-size: 13px; font-weight: 600; color: #64748b; margin: 0 0 8px;">
      Your verification code
    </p>
    <div style="font-size: 36px; font-weight: 900; letter-spacing: 8px; color: #047857;">
      {{ .Token }}
    </div>
  </div>
  <p style="color: #94a3b8; font-size: 13px; margin-top: 24px;">
    This code expires in 5 minutes. If you did not request this, you can safely ignore this email.
  </p>
  <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 24px 0;">
  <p style="color: #94a3b8; font-size: 12px; margin: 0;">
    Titan Optical &bull; Kathmandu, Nepal
  </p>
</div>
